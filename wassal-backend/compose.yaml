services:

  backend:
    build: .
    container_name: wassal_grocery
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${PG_NAME}
      SPRING_DATASOURCE_USERNAME: ${PG_USER}
      SPRING_DATASOURCE_PASSWORD: ${PG_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_MONGODB_URI: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/${MONGO_DB}?authSource=admin
      SECURITY_JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      SECURITY_JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS}
      SECURITY_JWT_REFRESH_TOKEN_EXPIRATION_MS: ${JWT_REFRESH_EXPIRATION_MS}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      - postgres
      - redis
      - mongo

  postgres:
    image: postgres:18
    container_name: wassal_postgres
    restart: always
    environment:
          POSTGRES_DB: ${PG_NAME}
          POSTGRES_USER: ${PG_USER}
          POSTGRES_PASSWORD: ${PG_PASSWORD}
          PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - wassal_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8.2-alpine
    container_name: wassal_redis
    restart: always
    volumes:
      - wassal_redis_data:/data

  mongo:
    image: mongo:8.2
    container_name: wassal_mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    command: mongod --bind_ip_all
    volumes:
      - wassal_mongo_data:/data/db

volumes:
  wassal_postgres_data:
  wassal_redis_data:
  wassal_mongo_data: